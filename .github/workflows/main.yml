name: Build and Push Docker Image

# 触发条件：推送到 main 分支时运行
于:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 运行环境

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx（支持构建和推送）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: 。  # 使用当前目录作为构建上下文
          file: ./Dockerfile  # 指定 Dockerfile 路径
          push: true  # 推送镜像到 Docker Hub
          标签: |
            ${{ secrets.DOCKERHUB_USERNAME }}/grok2api:latest  # 镜像名称和标签
            ${{ secrets.DOCKERHUB_USERNAME }}/grok2api:${{ github.sha }}  # 使用 commit SHA 作为版本标签
