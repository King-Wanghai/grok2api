name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '自定义镜像标签（默认用 latest + SHA）'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 推荐使用 Buildx（支持缓存、多平台等高级功能）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 登录 Docker Hub（必须在 build-push 之前）
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 构建 + 推送（PR 时只构建不推送）
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}   # 只有 push 到 main 时才推送
          tags: |
            qwezxcjkl/grok2api:latest
            qwezxcjkl/grok2api:${{ github.sha }}
